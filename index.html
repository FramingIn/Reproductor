<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Audio Master Pro - 30 Bandas</title>
    <style>
        :root { --accent: #00f2ff; --bg: #0a0a0a; --panel: #161616; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* 1. Espectro */
        #visualizer { width: 90%; height: 180px; background: #000; border: 1px solid #333; margin-bottom: 10px; }

        /* 2. Navegación */
        .nav-panel { 
            background: var(--panel); padding: 15px; border-radius: 8px; width: 90%; 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .btn-group button { padding: 8px 12px; cursor: pointer; background: #222; color: #ccc; border: 1px solid #444; border-radius: 4px; transition: 0.2s; }
        .btn-group button:hover { background: #333; border-color: var(--accent); }
        .btn-group button.active { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 5px var(--accent); }
        
        /* 3. Fila de Música */
        .playlist-wrapper { width: 90%; background: var(--panel); border-radius: 8px; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        #trackList { max-height: 120px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #333; }
        .track { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; font-size: 14px; opacity: 0.7; }
        .track:hover { background: #222; }
        .track.playing { opacity: 1; color: var(--accent); background: #1a1a1a; border-left: 3px solid var(--accent); }

        /* 4. Ecualizador (30 Bandas) */
        .eq-wrapper { width: 90%; background: var(--panel); padding: 15px; border-radius: 8px; box-sizing: border-box; }
        .eq-scroll { overflow-x: auto; display: flex; padding-bottom: 10px; }
        .eq-grid { display: flex; gap: 8px; min-width: 1000px; height: 150px; align-items: flex-end; }
        .eq-band { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .eq-band input[type="range"] { appearance: slider-vertical; width: 12px; height: 100px; background: #333; }
        .eq-band span { font-size: 9px; margin-top: 5px; color: #888; }
    </style>
</head>
<body>

    <canvas id="visualizer"></canvas>

    <div class="nav-panel">
        <div class="btn-group">
            <button id="prevBtn">⏮</button>
            <button id="playBtn">▶ Reproducir</button>
            <button id="nextBtn">⏭</button>
            <button id="shuffleBtn">🔀</button>
            <button id="repeatBtn">🔁</button>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <small>VOL</small>
            <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <div class="playlist-wrapper">
        <input type="file" id="fileInput" multiple accept="audio/*">
        <div id="trackList">Selecciona archivos para la fila...</div>
    </div>

    <div class="eq-wrapper">
        <div style="margin-bottom:10px; font-size: 12px; color: var(--accent)">ECUALIZADOR GRÁFICO (30 BANDAS)</div>
        <div class="eq-scroll">
            <div id="eq-bands" class="eq-grid"></div>
        </div>
    </div>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioContext.createAnalyser();
        const gainNode = audioContext.createGain();
        const audioEle = new Audio();
        
        // Evitar problemas de CORS y permitir el ruteo
        audioEle.crossOrigin = "anonymous";
        const source = audioContext.createMediaElementSource(audioEle);

        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const trackListDoc = document.getElementById('trackList');
        const eqBandsDoc = document.getElementById('eq-bands');

        let playlist = [];
        let currentIndex = 0;
        let isShuffle = false;
        let filters = [];

        // --- CONEXIÓN DE NODOS ---
        // Se conectarán dinámicamente en createEQ()
        gainNode.connect(audioContext.destination);

        // --- SISTEMA DE FILA CORREGIDO ---
        document.getElementById('fileInput').onchange = (e) => {
            const files = Array.from(e.target.files);
            if(files.length === 0) return;
            
            // Agregar a la fila actual sin borrar la anterior
            const newTracks = files.map(f => ({ name: f.name, url: URL.createObjectURL(f) }));
            playlist = [...playlist, ...newTracks];
            
            renderPlaylist();
            if(audioEle.paused && !audioEle.src) playTrack(0);
        };

        function renderPlaylist() {
            trackListDoc.innerHTML = '';
            playlist.forEach((track, i) => {
                const div = document.createElement('div');
                div.className = `track ${i === currentIndex ? 'playing' : ''}`;
                div.innerText = `${i+1}. ${track.name}`;
                div.onclick = () => playTrack(i);
                trackListDoc.appendChild(div);
            });
        }

        function playTrack(index) {
            if (playlist.length === 0) return;
            currentIndex = index;
            audioEle.src = playlist[currentIndex].url;
            audioEle.play().catch(e => console.log("Esperando interacción..."));
            if(audioContext.state === 'suspended') audioContext.resume();
            document.getElementById('playBtn').innerText = "⏸ Pausa";
            renderPlaylist();
        }

        // --- CONTROLES ---
        document.getElementById('playBtn').onclick = () => {
            if (audioEle.paused) { 
                audioEle.play(); 
                audioContext.resume();
            } else { 
                audioEle.pause(); 
            }
            document.getElementById('playBtn').innerText = audioEle.paused ? "▶ Reproducir" : "⏸ Pausa";
        };

        document.getElementById('nextBtn').onclick = () => {
            let next = isShuffle ? Math.floor(Math.random() * playlist.length) : (currentIndex + 1) % playlist.length;
            playTrack(next);
        };

        document.getElementById('prevBtn').onclick = () => {
            let prev = (currentIndex - 1 + playlist.length) % playlist.length;
            playTrack(prev);
        };

        document.getElementById('shuffleBtn').onclick = (e) => {
            isShuffle = !isShuffle;
            e.target.classList.toggle('active', isShuffle);
        };

        document.getElementById('repeatBtn').onclick = (e) => {
            audioEle.loop = !audioEle.loop;
            e.target.classList.toggle('active', audioEle.loop);
        };

        document.getElementById('volSlider').oninput = (e) => gainNode.gain.value = e.target.value;

        audioEle.onended = () => { if (!audioEle.loop) document.getElementById('nextBtn').click(); };

        // --- ECUALIZADOR DE 30 BANDAS ---
        function initEQ() {
            // Frecuencias estándar ISO (25Hz a 16kHz)
            const freqs = [
                25, 31.5, 40, 50, 63, 80, 100, 125, 160, 200, 250, 315, 400, 500, 630, 
                800, 1000, 1250, 1600, 2000, 2500, 3150, 4000, 5000, 6300, 8000, 10000, 12500, 16000, 20000
            ];

            let lastNode = source;
            eqBandsDoc.innerHTML = '';

            freqs.forEach(f => {
                const filter = audioContext.createBiquadFilter();
                filter.type = "peaking";
                filter.frequency.value = f;
                filter.Q.value = 1.4; // Calidad para 30 bandas
                filter.gain.value = 0;

                lastNode.connect(filter);
                lastNode = filter;
                filters.push(filter);

                const container = document.createElement('div');
                container.className = 'eq-band';
                const slider = document.createElement('input');
                slider.type = 'range'; slider.min = -12; slider.max = 12; slider.step = 0.1; slider.value = 0;
                slider.oninput = (e) => filter.gain.value = e.target.value;
                
                const label = document.createElement('span');
                label.innerText = f >= 1000 ? (f/1000).toFixed(1)+'k' : f;

                container.appendChild(slider);
                container.appendChild(label);
                eqBandsDoc.appendChild(container);
            });

            lastNode.connect(analyser);
            analyser.connect(gainNode);
        }

        // --- VISUALIZADOR ---
        analyser.fftSize = 512;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);

            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / bufferLength) * 2;
            let x = 0;

            for(let i = 0; i < bufferLength; i++) {
                let barHeight = dataArray[i] * (canvas.height / 255);
                
                // Gradiente de color
                const hue = (i / bufferLength) * 200 + 160; // Del azul al cian
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                
                ctx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
                x += barWidth;
            }
        }

        initEQ();
        draw();
    </script>
</body>
</html>
